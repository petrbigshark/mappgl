input:
  sheet_name: 0         # null = first sheet
  reason_column: reason
  brand_column: brand
  color_column: color
  storecode_column: storecode
  reason_filter_substring: "(?i)(?:не найден цвет|не задано значение обязательного атрибута\\s*10\\s*:\\s*(?:цвет|color))"

dedupe:
  enabled: true
  unique_by: "brand_color_query"   # make LLM calls only once per unique query

template_output:
  enabled: true
  # Output will match the example template columns:
  # id, objectType, expr, outputValue, matchType, repeatMatching, params, indexNumber, clientEmail, oskellyId
  objectType_value: "COLOR"
  matchType_value: "EQUALS"
  repeatMatching_value: "false"
  params_value: "{}"
  indexNumber_start: 1000          # you will override via CLI if needed
  clientEmail_value: "example@mail.com"  # you will override via CLI
  oskellyId_value: ""              # keep empty unless you need it
  filename: "template_output.xlsx"

llm:
  enabled: true
  model: "gpt-5-mini"
  # Resource guards:
  # - max_retries: retries per batch (SDK auto-retries are disabled in code)
  # - batch_size: values per single LLM request
  # - max_total_calls: hard limit for number of LLM requests per run
  max_retries: 1
  batch_size: 500
  max_total_calls: 6
  # Safety check: abort export if almost everything became "Other".
  max_other_ratio: 0.98
  # Write raw LLM responses to output/_llm_debug for troubleshooting.
  debug_enabled: false
  base_delay_sec: 1.0
  timeout_sec: 300

allowed_colors:
  - "Anthracite"
  - "Beige"
  - "Black"
  - "Blue"
  - "Brown"
  - "Burgundy"
  - "Coral"
  - "Deep blue"
  - "Fuchsia"
  - "Gold"
  - "Green"
  - "Grey"
  - "Khaki"
  - "Light Blue"
  - "Light Green"
  - "Multicolour"
  - "Mustard"
  - "Orange"
  - "Other"
  - "Pink"
  - "Purple"
  - "Red"
  - "Silver"
  - "Turquoise"
  - "White"
  - "Yellow"
